jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify API Token
        run: |
          node -e "
            const token = process.env.API_TOKEN || '';
            console.log('Exists:', !!token);
            console.log('Length:', token.length);
            console.log('Starts with Bearer:', token.startsWith('Bearer'));
            console.log('First 5 codes:', [...token].slice(0,5).map(c=>c.charCodeAt(0)));
            console.log('Last 5 codes:', [...token].slice(-5).map(c=>c.charCodeAt(0)));
          "
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx playwright test --project=chromium
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          API_BASE_URL: ${{ secrets.API_BASEURL }}
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}